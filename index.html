<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Calculator Level 5</title>

<style>
body {
    margin: 0;
    background: #000;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* APP CONTAINER */
.app {
    width: 380px;
    background: #000;
    border-radius: 20px;
    overflow: hidden;
}

/* DISPLAY */
.display {
    color: white;
    font-size: 42px;
    text-align: right;
    padding: 20px;
    min-height: 70px;
}

/* HISTORY */
.history {
    color: #888;
    font-size: 14px;
    text-align: right;
    padding: 0 20px;
    min-height: 20px;
}

/* BUTTON GRID */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 15px;
}

button {
    height: 65px;
    border: none;
    border-radius: 18px;
    font-size: 20px;
    cursor: pointer;
    transition: 0.15s;
}

button:active {
    transform: scale(0.92);
}

.gray { background: #a5a5a5; }
.dark { background: #333; color: white; }
.orange { background: #ff9500; color: white; }
.blue { background: #1e90ff; color: white; }

.zero {
    grid-column: span 2;
}

/* ANIMATION */
.fade {
    animation: fadeIn 0.15s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0.2; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="app">
    <div class="history" id="history"></div>
    <div class="display" id="display">0</div>

    <div class="buttons">
        <button class="gray" onclick="clearAll()">AC</button>
        <button class="gray" onclick="backspace()">⌫</button>
        <button class="gray" onclick="add('%')">%</button>
        <button class="orange" onclick="add('/')">÷</button>

        <button class="dark" onclick="add('7')">7</button>
        <button class="dark" onclick="add('8')">8</button>
        <button class="dark" onclick="add('9')">9</button>
        <button class="orange" onclick="add('*')">×</button>

        <button class="dark" onclick="add('4')">4</button>
        <button class="dark" onclick="add('5')">5</button>
        <button class="dark" onclick="add('6')">6</button>
        <button class="orange" onclick="add('-')">−</button>

        <button class="dark" onclick="add('1')">1</button>
        <button class="dark" onclick="add('2')">2</button>
        <button class="dark" onclick="add('3')">3</button>
        <button class="orange" onclick="add('+')">+</button>

        <button class="dark zero" onclick="add('0')">0</button>
        <button class="dark" onclick="add('.')">.</button>
        <button class="orange" onclick="calculate()">=</button>
    </div>
</div>

<script>

// ===== STATE =====
let expression = "";
let lastResult = "";
let history = document.getElementById("history");
let display = document.getElementById("display");

// ===== UI UPDATE =====
function update() {
    display.innerText = expression || "0";
    display.classList.add("fade");
    setTimeout(() => display.classList.remove("fade"), 100);
}

// ===== INPUT =====
function add(val) {
    expression += val;
    update();
}

// ===== BACKSPACE =====
function backspace() {
    expression = expression.slice(0, -1);
    update();
}

// ===== CLEAR =====
function clearAll() {
    expression = "";
    update();
}

// ===== SAFE ENGINE (REAL PRODUCT LEVEL) =====
function solve(expr) {
    try {
        // safer than eval but still simple for product demo
        return Function("return " + expr)();
    } catch {
        return "Error";
    }
}

// ===== CALCULATE =====
function calculate() {
    if (!expression) return;

    let result = solve(expression);

    // Save history
    history.innerText = expression + " = " + result;

    lastResult = result;
    expression = result.toString();

    update();
}

// ===== KEYBOARD SUPPORT =====
document.addEventListener("keydown", (e) => {
    if (!isNaN(e.key)) add(e.key);
    if (["+", "-", "*", "/", "."].includes(e.key)) add(e.key);
    if (e.key === "Enter") calculate();
    if (e.key === "Backspace") backspace();
    if (e.key === "Escape") clearAll();
});

update();

</script>

</body>
</html>
