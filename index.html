<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Calculator</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculator {
    width: 320px;
}

.display {
    color: white;
    font-size: 60px;
    text-align: right;
    padding: 20px;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 10px;
}

button {
    height: 70px;
    border-radius: 50%;
    border: none;
    font-size: 24px;
}

.gray { background: #a5a5a5; }
.dark { background: #333; color: white; }
.orange { background: #ff9500; color: white; }

.zero {
    grid-column: span 2;
    border-radius: 40px;
}
</style>
</head>

<body>

<div class="calculator">
    <div id="display" class="display">0</div>

    <div class="buttons">
        <button class="gray" onclick="clearAll()">AC</button>
        <button class="gray" onclick="toggleSign()">±</button>
        <button class="gray" onclick="percent()">%</button>
        <button class="orange" onclick="setOperator('/')">÷</button>

        <button class="dark" onclick="press(7)">7</button>
        <button class="dark" onclick="press(8)">8</button>
        <button class="dark" onclick="press(9)">9</button>
        <button class="orange" onclick="setOperator('*')">×</button>

        <button class="dark" onclick="press(4)">4</button>
        <button class="dark" onclick="press(5)">5</button>
        <button class="dark" onclick="press(6)">6</button>
        <button class="orange" onclick="setOperator('-')">−</button>

        <button class="dark" onclick="press(1)">1</button>
        <button class="dark" onclick="press(2)">2</button>
        <button class="dark" onclick="press(3)">3</button>
        <button class="orange" onclick="setOperator('+')">+</button>

        <button class="dark zero" onclick="press(0)">0</button>
        <button class="dark" onclick="dot()">.</button>
        <button class="orange" onclick="equal()">=</button>
    </div>
</div>

<script>
let display = document.getElementById("display");

// STATE (this is very important)
let current = "0";     // number you are typing
let previous = null;   // stored number
let operator = null;   // + - * /
let resetNext = false; // when to reset screen

// UPDATE SCREEN
function updateDisplay() {
    display.innerText = current;
}

// NUMBER CLICK
function press(num) {
    if (current === "0" || resetNext) {
        current = num.toString();
        resetNext = false;
    } else {
        current += num;
    }
    updateDisplay();
}

// DOT
function dot() {
    if (!current.includes(".")) {
        current += ".";
        updateDisplay();
    }
}

// SET OPERATOR (+ - × ÷)
function setOperator(op) {
    if (operator !== null) calculate(); // solve previous first

    previous = parseFloat(current);
    operator = op;
    resetNext = true;
}

// ⭐⭐⭐ THIS IS THE REAL "SOLVE MATH" CODE ⭐⭐⭐
function calculate() {
    if (operator === null || previous === null) return;

    let currentNumber = parseFloat(current);
    let result;

    if (operator === "+") result = previous + currentNumber;
    if (operator === "-") result = previous - currentNumber;
    if (operator === "*") result = previous * currentNumber;
    if (operator === "/") {
        if (currentNumber === 0) {
            current = "Error";
            updateDisplay();
            return;
        }
        result = previous / currentNumber;
    }

    current = result.toString();
    operator = null;
    previous = null;
    resetNext = true;

    updateDisplay();
}

// EQUAL BUTTON
function equal() {
    calculate();
}

// CLEAR
function clearAll() {
    current = "0";
    previous = null;
    operator = null;
    updateDisplay();
}

// PLUS/MINUS
function toggleSign() {
    current = (parseFloat(current) * -1).toString();
    updateDisplay();
}

// PERCENT
function percent() {
    current = (parseFloat(current) / 100).toString();
    updateDisplay();
}
</script>

</body>
</html>
