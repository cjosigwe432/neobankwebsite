<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full Pro Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
}

.app {
    width: 380px;
    background: #000;
    border-radius: 20px;
    overflow: hidden;
}

.history {
    color: #888;
    text-align: right;
    padding: 10px 20px 0;
    font-size: 14px;
    min-height: 20px;
}

.display {
    color: #fff;
    text-align: right;
    padding: 20px;
    font-size: 42px;
    min-height: 60px;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 15px;
}

button {
    height: 65px;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    cursor: pointer;
}

.dark { background: #333; color: white; }
.gray { background: #a5a5a5; }
.orange { background: #ff9500; color: white; }
.blue { background: #1e90ff; color: white; }

.zero {
    grid-column: span 2;
}
</style>
</head>

<body>

<div class="app">
    <div class="history" id="history"></div>
    <div class="display" id="display">0</div>

    <div class="buttons">
        <button class="gray" onclick="clearAll()">AC</button>
        <button class="gray" onclick="back()">⌫</button>
        <button class="gray" onclick="add('(')">(</button>
        <button class="orange" onclick="add('/')">÷</button>

        <button class="dark" onclick="add('7')">7</button>
        <button class="dark" onclick="add('8')">8</button>
        <button class="dark" onclick="add('9')">9</button>
        <button class="orange" onclick="add('*')">×</button>

        <button class="dark" onclick="add('4')">4</button>
        <button class="dark" onclick="add('5')">5</button>
        <button class="dark" onclick="add('6')">6</button>
        <button class="orange" onclick="add('-')">−</button>

        <button class="dark" onclick="add('1')">1</button>
        <button class="dark" onclick="add('2')">2</button>
        <button class="dark" onclick="add('3')">3</button>
        <button class="orange" onclick="add('+')">+</button>

        <button class="dark zero" onclick="add('0')">0</button>
        <button class="dark" onclick="add('.')">.</button>
        <button class="orange" onclick="calc()">=</button>

        <!-- SCIENTIFIC -->
        <button class="blue" onclick="func('sin(')">sin</button>
        <button class="blue" onclick="func('cos(')">cos</button>
        <button class="blue" onclick="func('tan(')">tan</button>
        <button class="blue" onclick="func('sqrt(')">√</button>
    </div>
</div>

<script>

// ================= STATE =================
let expr = "";
let history = document.getElementById("history");
let display = document.getElementById("display");

// ================= UI =================
function render() {
    display.innerText = expr || "0";
}

// ================= INPUT =================
function add(v) {
    expr += v;
    render();
}

function func(f) {
    expr += f;
    render();
}

function back() {
    expr = expr.slice(0, -1);
    render();
}

function clearAll() {
    expr = "";
    render();
}

// ================= SCIENTIFIC CONVERTER =================
function convert(expr) {
    return expr
        .replace(/sin\(/g, "Math.sin(")
        .replace(/cos\(/g, "Math.cos(")
        .replace(/tan\(/g, "Math.tan(")
        .replace(/sqrt\(/g, "Math.sqrt(");
}

// ================= PRODUCTION ENGINE =================
function tokenize(e) {
    return e.match(/\d+(\.\d+)?|[+\-*/()]/g);
}

function precedence(op) {
    return (op === "+" || op === "-") ? 1 : 2;
}

function toRPN(tokens) {
    let out = [];
    let ops = [];

    for (let t of tokens) {
        if (!isNaN(t)) out.push(Number(t));

        else if (t === "(") ops.push(t);

        else if (t === ")") {
            while (ops.length && ops.at(-1) !== "(") {
                out.push(ops.pop());
            }
            ops.pop();
        }

        else {
            while (ops.length && precedence(ops.at(-1)) >= precedence(t)) {
                out.push(ops.pop());
            }
            ops.push(t);
        }
    }

    while (ops.length) out.push(ops.pop());
    return out;
}

function evalRPN(rpn) {
    let s = [];

    for (let t of rpn) {
        if (typeof t === "number") s.push(t);
        else {
            let b = s.pop();
            let a = s.pop();

            if (t === "+") s.push(a + b);
            if (t === "-") s.push(a - b);
            if (t === "*") s.push(a * b);
            if (t === "/") s.push(a / b);
        }
    }

    return s[0];
}

// ================= CALCULATE =================
function calc() {
    try {
        history.innerText = expr;

        let safe = convert(expr);
        let tokens = tokenize(safe);
        let rpn = toRPN(tokens);
        let result = evalRPN(rpn);

        expr = result.toString();
        render();
    } catch {
        expr = "Error";
        render();
    }
}

// ================= KEYBOARD =================
document.addEventListener("keydown", (e) => {
    if (!isNaN(e.key)) add(e.key);
    if ("+-*/().".includes(e.key)) add(e.key);
    if (e.key === "Enter") calc();
    if (e.key === "Backspace") back();
    if (e.key === "Escape") clearAll();
});

render();

</script>

</body>
</html>
