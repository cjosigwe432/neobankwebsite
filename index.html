<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoBank App</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: sans-serif;
  padding: 20px;
}
input, button {
  width: 100%;
  margin: 10px 0;
  padding: 12px;
}
.hidden { display: none; }
</style>
</head>

<body>

<h2>NeoBank</h2>

<!-- AUTH -->
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <h3>Balance: ¥<span id="balance">0</span></h3>
  <input id="amount" placeholder="Send Amount">
  <button onclick="sendMoney()">Send</button>
  <button onclick="logout()">Logout</button>
</div>

<script>
// 🔥 REPLACE WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDLvK-Q4v1hZ2B-mtxZzNXs5m1tCS6LdGw",
  authDomain: "neobank-app-3ebbe.firebaseapp.com",
  projectId: "neobank-app-3ebbe",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// SIGNUP
function signup() {
  const email = emailInput.value;
  const password = passwordInput.value;

  auth.createUserWithEmailAndPassword(email, password)
  .then(user => {
    db.collection("users").doc(user.user.uid).set({
      balance: 50000
    });
  });
}

// LOGIN
function login() {
  auth.signInWithEmailAndPassword(email.value, password.value);
}

// LOGOUT
function logout() {
  auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    db.collection("users").doc(user.uid).onSnapshot(doc => {
      document.getElementById("balance").innerText = doc.data().balance;
    });
  } else {
    document.getElementById("auth").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");
  }
});

// SEND MONEY
function sendMoney() {
  const amount = parseInt(document.getElementById("amount").value);
  const user = auth.currentUser;

  const ref = db.collection("users").doc(user.uid);

  db.runTransaction(async (t) => {
    const doc = await t.get(ref);
    let balance = doc.data().balance;

    if (amount > balance) {
      alert("Insufficient funds");
      return;
    }

    balance -= amount;
    t.update(ref, { balance });
  });
}
</script>

</body>
</html>
